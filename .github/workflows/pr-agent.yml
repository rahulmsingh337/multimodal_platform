name: 🔍 PR Validation Agent

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

jobs:
  validate-pr:
    name: 🔍 Validate PR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check PR title format
        uses: actions/github-script@v7
        with:
          script: |
            const title = context.payload.pull_request.title;
            const valid = ['feat:','fix:','chore:','docs:','refactor:','test:','style:','perf:','ci:'];
            const ok = valid.some(p => title.toLowerCase().startsWith(p));
            if (!ok) {
              core.warning('PR title "' + title + '" should follow conventional commits: feat: | fix: | chore: | docs: etc.');
            } else {
              console.log('PR title valid: ' + title);
            }

      - name: Scan for committed secrets
        run: |
          echo "Scanning for secrets..."
          if grep -rn --include="*.ts" --include="*.js" --include="*.py" \
            -E "(sk-[a-zA-Z0-9]{20,}|ghp_[a-zA-Z0-9]{20,}|r8_[a-zA-Z0-9]{20,}|AKIA[A-Z0-9]{16})" \
            --exclude-dir=".git" --exclude-dir="node_modules" . 2>/dev/null; then
            echo "::error::Potential secret found in files!"
            exit 1
          else
            echo "No secrets detected"
          fi

      - name: Check for large files
        run: |
          find . -size +5M -not -path "./.git/*" -not -path "./node_modules/*" | while read f; do
            echo "::warning::Large file: $f"
          done

      - name: Post PR summary comment
        uses: actions/github-script@v7
        with:
          script: |
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });
            const additions = files.reduce((s, f) => s + f.additions, 0);
            const deletions = files.reduce((s, f) => s + f.deletions, 0);
            const fileList = files.slice(0, 15).map(f => '- `' + f.filename + '` (' + f.status + ')').join('\n');
            const more = files.length > 15 ? '\n_...and ' + (files.length - 15) + ' more_' : '';
            const sizeNote = files.length > 50
              ? '> Warning: Large PR - consider splitting into smaller changes.'
              : '> All checks passed. Safe to review.';
            const body = [
              '## PR Validation Report',
              '',
              '| Metric | Value |',
              '|--------|-------|',
              '| Files changed | ' + files.length + ' |',
              '| Lines added | +' + additions + ' |',
              '| Lines removed | -' + deletions + ' |',
              '| Author | @' + context.actor + ' |',
              '',
              sizeNote,
              '',
              '**Changed files:**',
              fileList + more,
            ].join('\n');
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes('PR Validation Report'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
