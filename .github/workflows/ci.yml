name: 🤖 CI Agent — Build, Lint & Type Check

on:
  push:
    branches: ["master", "main", "dev"]
  pull_request:
    branches: ["master", "main"]

jobs:
  frontend-check:
    name: 🖥️ Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install deps
        run: npm ci
      - name: Type check
        run: npx tsc --noEmit
      - name: Build
        run: npm run build
        env:
          NEXTAUTH_SECRET: ci-test-secret
          NEXT_PUBLIC_API_URL: https://multimodal-api.onrender.com

  backend-check:
    name: 🐍 Backend Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt
      - name: Install deps
        run: pip install -r backend/requirements.txt
      - name: Install ruff
        run: pip install ruff
      - name: Lint
        run: ruff check backend/ --output-format=github
        continue-on-error: true

  pr-comment:
    name: 💬 PR Report
    runs-on: ubuntu-latest
    needs: [frontend-check, backend-check]
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const fe = '${{ needs.frontend-check.result }}';
            const be = '${{ needs.backend-check.result }}';
            const e  = s => s === 'success' ? '✅' : s === 'failure' ? '❌' : '⚠️';
            const body = [
              '## 🤖 CI Agent Report',
              '',
              '| Check | Status |',
              '|-------|--------|',
              `| 🖥️ Frontend Build (Next.js 14) | ${e(fe)} ${fe} |`,
              `| 🐍 Backend Lint (Python/Ruff) | ${e(be)} ${be} |`,
              '',
              `**Commit:** \`${{ github.sha }}\`  **Branch:** \`${{ github.head_ref }}\`  **By:** @${{ github.actor }}`,
              '',
              fe === 'failure' ? '> ❌ **Frontend failed** — check Actions tab for build errors.' : '',
              be === 'failure' ? '> ⚠️ **Backend lint issues** — run `ruff check backend/` locally.' : '',
              fe === 'success' && be === 'success' ? '> 🚀 **All checks passed!** Safe to merge.' : '',
            ].join('\n');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });
